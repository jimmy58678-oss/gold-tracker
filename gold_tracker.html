<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="黃金記錄簿">
<meta name="theme-color" content="#FAF5EC">
<link rel="manifest" href="manifest.json">
<!-- iOS icons -->
<link rel="apple-touch-icon" href="icon-192.png">
<title>黃金記錄簿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --cream:#FAF5EC;
  --cream2:#F3EBD8;
  --cream3:#EAE0C8;
  --parchment:#E4D5B7;
  --ink:#3C2E1A;
  --ink2:#5C4A30;
  --ink3:#7A6445;
  --gold:#B8860B;
  --gold2:#D4A017;
  --gold-pale:#F5E6C0;
  --red:#A0392B;
  --green:#3A7D55;
  --bd:rgba(139,100,30,.18);
  --bdh:rgba(139,100,30,.38);
  --dim:#9A8060;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);min-height:100vh;font-family:'Noto Serif TC',serif;color:var(--ink);padding:28px 16px 80px;padding-top:max(28px,env(safe-area-inset-top));padding-bottom:max(80px,env(safe-area-inset-bottom));padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 10% 5%,rgba(210,170,50,.06),transparent 60%),radial-gradient(ellipse 50% 60% at 90% 90%,rgba(180,140,30,.05),transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:24px}
.eyebrow{font-size:11px;letter-spacing:7px;color:var(--gold);opacity:.7;margin-bottom:8px;text-transform:uppercase}
.header h1{font-family:'Playfair Display',serif;font-size:36px;color:var(--ink);letter-spacing:2px}
.rule{display:flex;align-items:center;gap:12px;margin:10px auto 0;width:160px}
.rule::before,.rule::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.rule span{color:var(--gold);font-size:12px}

/* ── Price Bar ── */
.pbar{background:var(--cream2);border:1px solid var(--parchment);border-radius:14px;padding:16px 22px;margin-bottom:16px;position:relative;box-shadow:0 2px 12px rgba(139,100,30,.07)}
.pbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);border-radius:14px 14px 0 0}
.pbar-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.pbar-l{display:flex;align-items:center;gap:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(58,125,85,.5);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.plabel{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.pmain{font-family:'Playfair Display',serif;font-size:26px;color:var(--ink)}
.psub{font-size:11px;color:var(--dim);margin-top:2px}
.pchange{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;display:none;font-family:'Noto Serif TC',serif}
.pchange.up{background:rgba(58,125,85,.12);color:var(--green)}
.pchange.down{background:rgba(160,57,43,.12);color:var(--red)}
.src-tag{font-size:10px;color:var(--dim);margin-top:3px}
.pright{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.fxbox{font-size:13px;color:var(--ink2)}
.updated{font-size:11px;color:var(--dim)}
.btn-ref{background:none;border:1px solid var(--bd);border-radius:8px;padding:6px 14px;color:var(--gold);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Noto Serif TC',serif;white-space:nowrap}
.btn-ref:hover{border-color:var(--gold2);background:rgba(180,134,11,.06)}
.pload{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim)}
.spin{width:14px;height:14px;border:2px solid var(--parchment);border-top-color:var(--gold2);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Summary Cards ── */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.card{background:var(--cream2);border:1px solid var(--parchment);border-radius:12px;padding:13px 16px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(139,100,30,.06)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.clabel{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
.cval{font-family:'Playfair Display',serif;font-size:19px;color:var(--ink)}
.cval.pos{color:var(--green)}
.cval.neg{color:var(--red)}
.cunit{font-size:11px;color:var(--dim);margin-left:2px}
.pnl-bar{background:var(--gold-pale);border:1px solid var(--parchment);border-radius:12px;padding:13px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;box-shadow:0 1px 6px rgba(139,100,30,.06)}

/* ── Unit Toggle ── */
.urow{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.ulabel{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.utog{display:flex;background:var(--cream3);border:1px solid var(--parchment);border-radius:8px;overflow:hidden}
.ubtn{padding:7px 16px;font-family:'Noto Serif TC',serif;font-size:13px;color:var(--ink3);background:none;border:none;cursor:pointer;transition:all .2s;letter-spacing:1px}
.ubtn.active{background:var(--gold);color:#fff;font-weight:700}

/* ── Records ── */
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rtitle{font-size:11px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
.rcount{font-size:11px;color:var(--dim)}
.ritem{background:var(--cream2);border:1px solid var(--parchment);border-radius:14px;padding:14px 18px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;transition:border-color .2s,transform .15s,box-shadow .15s;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(139,100,30,.05)}
.ritem:hover{border-color:var(--bdh);transform:translateX(3px);box-shadow:0 3px 14px rgba(139,100,30,.1)}
.ritem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--gold2),var(--gold));border-radius:3px 0 0 3px}
.ritem.profit::before{background:linear-gradient(to bottom,#4CAF7D,#2d7a54)}
.ritem.loss::before{background:linear-gradient(to bottom,#C0392B,#8B2318)}
.rgrid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:5px 16px;align-items:start}
.rname{font-size:15px;color:var(--ink);font-weight:700;grid-column:1/-1;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{display:inline-block;background:var(--gold-pale);border:1px solid var(--parchment);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--gold);letter-spacing:1px}
.ml{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.mv{font-size:13px;color:var(--ink2);margin-top:2px}
.mv.pos{color:var(--green)}
.mv.neg{color:var(--red)}
.rright{text-align:right}
.rplabel{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.rpval{font-family:'Playfair Display',serif;font-size:19px;color:var(--ink)}
.rmval{font-size:11px;color:var(--dim);margin-top:2px}
.btndel{background:none;border:1px solid rgba(160,57,43,.2);color:rgba(160,57,43,.5);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .2s;margin-top:7px;font-family:'Noto Serif TC',serif}
.btndel:hover{background:rgba(160,57,43,.08);color:var(--red);border-color:var(--red)}
.empty{text-align:center;padding:48px 20px;color:var(--dim)}
.empty-icon{font-size:38px;margin-bottom:10px}

/* ── Collapsible Add Form ── */
.add-wrap{margin-bottom:20px}
.add-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  background:var(--cream2);border:1px solid var(--parchment);border-radius:12px;
  padding:13px 20px;cursor:pointer;transition:all .2s;
  box-shadow:0 1px 6px rgba(139,100,30,.06);
  font-family:'Noto Serif TC',serif;
}
.add-toggle:hover{border-color:var(--gold2);background:var(--gold-pale)}
.add-toggle-left{display:flex;align-items:center;gap:10px}
.add-toggle-icon{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;line-height:1;flex-shrink:0;transition:transform .3s}
.add-toggle-label{font-size:13px;font-weight:600;color:var(--ink2);letter-spacing:1px}
.add-toggle-arrow{font-size:12px;color:var(--dim);transition:transform .3s}
.add-toggle.open .add-toggle-arrow{transform:rotate(180deg)}
.add-toggle.open .add-toggle-icon{transform:rotate(45deg)}

.add-body{
  background:var(--cream2);
  border:1px solid var(--parchment);
  border-top:none;
  border-radius:0 0 14px 14px;
  padding:0 20px;
  max-height:0;
  overflow:hidden;
  transition:max-height .35s ease, padding .35s ease;
  box-shadow:0 3px 12px rgba(139,100,30,.07);
}
.add-body.open{max-height:600px;padding:20px}
.add-toggle.open{border-radius:12px 12px 0 0;border-bottom-color:transparent}

.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:13px}
.wrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-bottom:13px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.fg input,.fg select{background:var(--cream);border:1px solid var(--parchment);border-radius:8px;padding:9px 12px;color:var(--ink);font-family:'Noto Serif TC',serif;font-size:14px;outline:none;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--gold2)}
.fg input::placeholder{color:var(--dim);opacity:.5}
.fg select option{background:var(--cream);color:var(--ink)}
.fhint{font-size:11px;color:var(--gold);margin-top:3px;min-height:15px}
.btnadd{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;letter-spacing:3px;border:none;border-radius:9px;cursor:pointer;transition:all .2s;margin-top:2px}
.btnadd:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(180,134,11,.25)}

/* ── Chart ── */
.cpanel{background:var(--cream2);border:1px solid var(--parchment);border-radius:16px;padding:20px;margin-top:24px;position:relative;box-shadow:0 2px 12px rgba(139,100,30,.07)}
.cpanel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);border-radius:16px 16px 0 0}
.cheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ctitle{font-size:11px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
.cmeta{font-size:11px;color:var(--dim)}
.cwrap{position:relative;height:175px}

@media(max-width:700px){
  .summary{grid-template-columns:repeat(2,1fr)}
  .fgrid,.wrow{grid-template-columns:1fr 1fr}
  .rgrid{grid-template-columns:1fr 1fr}
  .header h1{font-size:28px}
  .pmain{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- Header -->
<div class="header">
  <div class="eyebrow">✦ 珍藏記錄 ✦</div>
  <h1>黃金記錄簿</h1>
  <div class="rule"><span>◆</span></div>
</div>

<!-- Price Bar -->
<div class="pbar">
  <div class="pbar-inner">
    <div class="pbar-l">
      <div class="dot" id="dot"></div>
      <div>
        <div class="plabel">XAU 即時金價（TWD / 克）</div>
        <div id="pdisplay" class="pload"><div class="spin"></div> 連線中...</div>
        <div class="psub" id="pusd"></div>
        <div class="src-tag" id="srctag"></div>
      </div>
      <div class="pchange" id="pchange"></div>
    </div>
    <div class="pright">
      <div>
        <div class="plabel">USD/TWD</div>
        <div class="fxbox" id="usdtwd">—</div>
      </div>
      <div>
        <div class="updated" id="updated">—</div>
        <div class="updated" id="nextup" style="margin-top:2px"></div>
      </div>
      <button class="btn-ref" onclick="fetchPrice(true)">↻ 手動更新</button>
    </div>
  </div>
</div>

<!-- Summary -->
<div class="summary">
  <div class="card"><div class="clabel">總筆數</div><div class="cval" id="s-n">—</div></div>
  <div class="card"><div class="clabel">持有重量（錢）</div><div class="cval" id="s-w">—</div></div>
  <div class="card"><div class="clabel">總成本</div><div class="cval" id="s-c">—</div></div>
  <div class="card"><div class="clabel">未實現損益</div><div class="cval" id="s-u">—</div></div>
</div>
<div class="pnl-bar">
  <div><div class="clabel" style="margin-bottom:4px">目前市值</div><div class="cval" id="s-m">—</div></div>
  <div><div class="clabel" style="margin-bottom:4px">已實現損益</div><div class="cval" id="s-r">—</div></div>
  <div><div class="clabel" style="margin-bottom:4px">總損益</div><div class="cval" id="s-t">—</div></div>
</div>

<!-- Unit Toggle -->
<div class="urow">
  <span class="ulabel">紀錄顯示單位</span>
  <div class="utog">
    <button class="ubtn active" onclick="setUnit('g')">公克 g</button>
    <button class="ubtn" onclick="setUnit('qian')">錢</button>
    <button class="ubtn" onclick="setUnit('liang')">兩</button>
  </div>
</div>

<!-- Records -->
<div class="rhead">
  <div class="rtitle">持倉 ＆ 歷史紀錄</div>
  <div class="rcount" id="rcount"></div>
</div>
<div id="rlist"></div>

<!-- Collapsible Add Form -->
<div class="add-wrap" id="addWrap">
  <button class="add-toggle" id="addToggle" onclick="toggleForm()">
    <div class="add-toggle-left">
      <div class="add-toggle-icon">＋</div>
      <span class="add-toggle-label">新增紀錄</span>
    </div>
    <span class="add-toggle-arrow">▼</span>
  </button>
  <div class="add-body" id="addBody">
    <div class="fgrid">
      <div class="fg"><label>名稱</label><input id="fn" placeholder="例：黃金條塊、金幣"></div>
      <div class="fg"><label>購買通路</label><input id="fc" placeholder="例：台銀、銀樓"></div>
      <div class="fg"><label>購買日期</label><input type="date" id="fd"></div>
    </div>
    <div class="wrow">
      <div class="fg"><label>重量單位</label>
        <select id="fwu">
          <option value="g">公克 (g)</option>
          <option value="qian">錢</option>
          <option value="liang">兩</option>
        </select>
      </div>
      <div class="fg"><label>重量</label><input type="number" id="fw" placeholder="0.000" step="0.001" min="0"></div>
      <div class="fg"><label>購買價格（TWD）</label><input type="number" id="fp" placeholder="0" min="0"><div class="fhint" id="fhint"></div></div>
    </div>
    <div class="fg" style="margin-bottom:13px">
      <label>已實現損益（出售時填入；持有中填 0）</label>
      <input type="number" id="fr" placeholder="0（正數=獲利，負數=虧損）">
    </div>
    <button class="btnadd" onclick="addRecord()">登　錄</button>
  </div>
</div>

<!-- Chart at bottom -->
<div class="cpanel">
  <div class="cheader">
    <div class="ctitle">持倉市值走勢</div>
    <div class="cmeta" id="cmeta">等待資料…</div>
  </div>
  <div class="cwrap"><canvas id="chart"></canvas></div>
</div>

</div>
<script>
const SK='gold_v3', CK='gold_chart_v3';
const toG={g:1,qian:3.75,liang:37.5};
const UL={g:'g',qian:'錢',liang:'兩'};
let unit='g', priceG=null, usdtwd=null, myChart=null, refreshTimer=null, countdown=30;

const load=()=>{try{return JSON.parse(localStorage.getItem(SK))||[];}catch{return[];}};
const save=r=>localStorage.setItem(SK,JSON.stringify(r));
const loadC=()=>{try{return JSON.parse(localStorage.getItem(CK))||{labels:[],values:[]};}catch{return{labels:[],values:[]};}}
const saveC=d=>localStorage.setItem(CK,JSON.stringify(d));

// ── Form toggle ──
let formOpen=false;
function toggleForm(){
  formOpen=!formOpen;
  document.getElementById('addToggle').classList.toggle('open',formOpen);
  document.getElementById('addBody').classList.toggle('open',formOpen);
  if(formOpen){ updateHint(); setTimeout(()=>document.getElementById('fn').focus(),350); }
}

function setUnit(u){
  unit=u;
  document.querySelectorAll('.ubtn').forEach((b,i)=>b.classList.toggle('active',['g','qian','liang'][i]===u));
  render();
}
function fw(g,u){const v=g/toG[u];return v%1===0?v.toFixed(0):parseFloat(v.toFixed(3)).toString();}
function fwQian(g){const v=g/3.75;return parseFloat(v.toFixed(3)).toString();}

// ── Price ──
async function tryGoldApiCom(){
  const r=await fetch('https://api.gold-api.com/price/XAU',{signal:AbortSignal.timeout(6000)});
  const d=await r.json();
  if(!d.price) throw new Error('no price');
  return{ozUSD:d.price,ch:d.ch??0,chp:d.chp??0,src:'gold-api.com'};
}
async function tryYahoo(){
  const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=1d&range=1d',{signal:AbortSignal.timeout(8000)});
  const d=await r.json();
  const price=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
  const prev=d?.chart?.result?.[0]?.meta?.chartPreviousClose;
  if(!price) throw new Error('no price');
  const ch=price-(prev||price),chp=prev?(ch/prev*100):0;
  return{ozUSD:price,ch,chp,src:'Yahoo Finance'};
}
async function fetchUSDTWD(){
  const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=TWD',{signal:AbortSignal.timeout(6000)});
  const d=await r.json(); return d.rates.TWD;
}
async function fetchUSDTWDFallback(){
  const r=await fetch('https://open.er-api.com/v6/latest/USD',{signal:AbortSignal.timeout(6000)});
  const d=await r.json(); return d.rates.TWD;
}

async function fetchPrice(manual=false){
  const dot=document.getElementById('dot');
  dot.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--gold2);box-shadow:0 0 6px rgba(210,160,23,.5);flex-shrink:0';
  if(manual) document.getElementById('pdisplay').innerHTML='<div class="pload"><div class="spin"></div> 更新中...</div>';

  let goldData=null, twd=null;
  try{goldData=await tryGoldApiCom();}catch{try{goldData=await tryYahoo();}catch{}}
  try{twd=await fetchUSDTWD();}catch{try{twd=await fetchUSDTWDFallback();}catch{twd=32.5;}}

  if(goldData&&twd){
    usdtwd=twd;
    const gUSD=goldData.ozUSD/31.1035;
    priceG=gUSD*usdtwd;
    document.getElementById('pdisplay').innerHTML=`<span class="pmain">NT$ ${priceG.toFixed(1)}</span><span style="font-size:12px;color:var(--dim);margin-left:6px">/ 克</span>`;
    document.getElementById('pusd').textContent=`US$ ${gUSD.toFixed(2)}/g · US$ ${goldData.ozUSD.toFixed(2)}/troy oz`;
    document.getElementById('usdtwd').textContent=usdtwd.toFixed(3);
    document.getElementById('srctag').textContent=`來源：${goldData.src}`;
    const pel=document.getElementById('pchange');
    pel.style.display='block';
    pel.className='pchange '+(goldData.ch>=0?'up':'down');
    pel.textContent=`${goldData.ch>=0?'▲':'▼'} ${Math.abs(goldData.ch).toFixed(2)} (${Math.abs(goldData.chp).toFixed(2)}%)`;
    const now=new Date();
    document.getElementById('updated').textContent=`最後更新：${now.toLocaleTimeString('zh-TW')}`;
    dot.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(58,125,85,.5);animation:pulse 2s infinite;flex-shrink:0';
    const mv=calcMV();
    if(mv>0){
      const h=loadC();
      h.labels.push(now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
      h.values.push(Math.round(mv));
      if(h.labels.length>200){h.labels.shift();h.values.shift();}
      saveC(h);updateChart(h);
    }
    render();
  } else {
    document.getElementById('pdisplay').innerHTML=`<span style="color:var(--red);font-size:12px">⚠ 無法取得金價，請確認網路後手動更新</span>`;
    dot.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0';
  }
  updateHint();
  resetCountdown();
}

function calcMV(){
  if(!priceG)return 0;
  return load().filter(r=>!r.sold).reduce((s,r)=>s+r.weightG*priceG,0);
}
function resetCountdown(){
  countdown=30;clearInterval(refreshTimer);
  refreshTimer=setInterval(()=>{
    countdown--;
    document.getElementById('nextup').textContent=countdown>0?`${countdown} 秒後自動更新`:'更新中…';
    if(countdown<=0)fetchPrice(false);
  },1000);
}
function updateHint(){
  if(!priceG)return;
  const w=parseFloat(document.getElementById('fw').value)||0;
  const wu=document.getElementById('fwu').value;
  const wg=w*toG[wu];
  document.getElementById('fhint').textContent=wg>0?`當前市值參考：NT$ ${Math.round(wg*priceG).toLocaleString()}`:`金價：NT$ ${priceG.toFixed(1)} / 克`;
}

// ── Chart ──
function initChart(){
  const ctx=document.getElementById('chart').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,175);
  g.addColorStop(0,'rgba(180,134,11,.16)');g.addColorStop(1,'rgba(180,134,11,0)');
  myChart=new Chart(ctx,{
    type:'line',
    data:{labels:[],datasets:[{label:'市值',data:[],borderColor:'#B8860B',backgroundColor:g,borderWidth:2,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#D4A017',fill:true,tension:0.4}]},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:400},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#FAF5EC',borderColor:'rgba(139,100,30,.25)',borderWidth:1,titleColor:'#3C2E1A',bodyColor:'#5C4A30',callbacks:{label:c=>`NT$ ${Math.round(c.parsed.y).toLocaleString()}`}}},
      scales:{
        x:{grid:{color:'rgba(139,100,30,.06)'},ticks:{color:'#9A8060',font:{size:10},maxTicksLimit:8}},
        y:{grid:{color:'rgba(139,100,30,.06)'},ticks:{color:'#9A8060',font:{size:10},callback:v=>'NT$'+Math.round(v/1000)+'K'}}
      }
    }
  });
}
function updateChart(h){
  if(!myChart)return;
  myChart.data.labels=h.labels;
  myChart.data.datasets[0].data=h.values;
  myChart.update('none');
  document.getElementById('cmeta').textContent=`${h.labels.length} 個資料點 · 每 30 秒自動更新`;
}

// ── Add record ──
function addRecord(){
  const name=document.getElementById('fn').value.trim();
  const ch=document.getElementById('fc').value.trim();
  const date=document.getElementById('fd').value;
  const wu=document.getElementById('fwu').value;
  const wi=parseFloat(document.getElementById('fw').value);
  const price=parseFloat(document.getElementById('fp').value);
  const realized=parseFloat(document.getElementById('fr').value)||0;
  if(!name||!date||isNaN(wi)||wi<=0||isNaN(price)||price<0){alert('請填寫完整資訊（名稱、日期、重量、購買價格為必填）');return;}
  const weightG=wi*toG[wu];
  const sold=realized!==0;
  const recs=load();
  recs.unshift({id:Date.now(),name,ch,date,weightG,price,realized,sold});
  save(recs);
  ['fn','fc','fw','fp','fr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fd').value=new Date().toISOString().split('T')[0];
  // Close form after adding
  formOpen=true; toggleForm();
  render();
}

function delRecord(id){
  if(!confirm('確定刪除這筆紀錄？'))return;
  save(load().filter(r=>r.id!==id));
  render();
}

function setPC(id,v){
  const el=document.getElementById(id);
  if(v===null){el.className='cval';el.textContent='—';return;}
  el.className='cval '+(v>=0?'pos':'neg');
  el.textContent=(v>=0?'+':'-')+'NT$'+Math.round(Math.abs(v)).toLocaleString();
}

function render(){
  const recs=load();
  const held=recs.filter(r=>!r.sold);
  const twG=held.reduce((s,r)=>s+r.weightG,0);
  const tc=recs.reduce((s,r)=>s+r.price,0);
  const tReal=recs.reduce((s,r)=>s+r.realized,0);
  const mv=priceG?held.reduce((s,r)=>s+r.weightG*priceG,0):null;
  const heldCost=held.reduce((s,r)=>s+r.price,0);
  const unreal=mv!==null?mv-heldCost:null;

  document.getElementById('s-n').innerHTML=`${recs.length}<span class="cunit">筆</span>`;
  document.getElementById('s-w').innerHTML=`${fwQian(twG)}<span class="cunit">錢</span>`;
  document.getElementById('s-c').textContent=`NT$${Math.round(tc).toLocaleString()}`;
  setPC('s-u',unreal);
  document.getElementById('s-m').textContent=mv!==null?`NT$${Math.round(mv).toLocaleString()}`:'—';
  setPC('s-r',tReal===0?null:tReal);
  setPC('s-t',(unreal!==null||(tReal!==0))?((unreal??0)+tReal):null);

  document.getElementById('rcount').textContent=`共 ${recs.length} 筆`;
  const list=document.getElementById('rlist');
  if(!recs.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">⚜</div><div>尚無紀錄，點下方「新增紀錄」開始登錄</div></div>';
    return;
  }
  list.innerHTML=recs.map(r=>{
    const wDisp=fw(r.weightG,unit);
    const wQian=fwQian(r.weightG);
    const wLabel=unit==='qian'?`${wDisp} 錢`:`${wDisp} ${UL[unit]}（${wQian} 錢）`;
    const mgv=priceG&&!r.sold?r.weightG*priceG:null;
    const unr=mgv!==null?mgv-r.price:null;
    const cpg=r.weightG>0?r.price/r.weightG:0;
    const cls=unr===null?'':(unr>=0?' profit':' loss');
    const unrealRow=unr!==null?`<div><div class="ml">未實現損益</div><div class="mv ${unr>=0?'pos':'neg'}">${unr>=0?'+':'-'}NT$${Math.round(Math.abs(unr)).toLocaleString()}</div></div>`:'';
    const realRow=r.realized!==0?`<div><div class="ml">已實現損益</div><div class="mv ${r.realized>=0?'pos':'neg'}">${r.realized>=0?'+':'-'}NT$${Math.abs(r.realized).toLocaleString()}</div></div>`:'';
    return `<div class="ritem${cls}">
      <div>
        <div class="rgrid">
          <div class="rname">${r.name}${r.ch?`<span class="tag">${r.ch}</span>`:''}${r.sold?`<span class="tag" style="opacity:.6">已出售</span>`:''}</div>
          <div><div class="ml">重量</div><div class="mv">${wLabel}</div></div>
          <div><div class="ml">日期</div><div class="mv">${r.date.replace(/-/g,'/')}</div></div>
          <div><div class="ml">成本/克</div><div class="mv">NT$${Math.round(cpg).toLocaleString()}</div></div>
          ${unrealRow}${realRow}
        </div>
        <button class="btndel" onclick="delRecord(${r.id})">刪除</button>
      </div>
      <div class="rright">
        <div class="rplabel">購買金額</div>
        <div class="rpval">NT$${r.price.toLocaleString()}</div>
        ${mgv!==null?`<div class="rmval">市值 NT$${Math.round(mgv).toLocaleString()}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── PWA Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ── Init ──
document.getElementById('fd').value=new Date().toISOString().split('T')[0];
document.getElementById('fw').addEventListener('input',updateHint);
document.getElementById('fwu').addEventListener('change',updateHint);
initChart();
const saved=loadC();
if(saved.labels.length)updateChart(saved);
render();
fetchPrice(true);
</script>
</body>
</html>
