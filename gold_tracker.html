<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="金喝炭">
<meta name="theme-color" content="#FAF5EC">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>金喝炭</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{
  --cream:#FAF5EC;--cream2:#F3EBD8;--cream3:#EAE0C8;--parchment:#E4D5B7;
  --ink:#3C2E1A;--ink2:#5C4A30;--ink3:#7A6445;
  --gold:#B8860B;--gold2:#D4A017;--gold-pale:#F5E6C0;
  --red:#A0392B;--green:#3A7D55;
  --bd:rgba(139,100,30,.18);--bdh:rgba(139,100,30,.38);--dim:#9A8060;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);min-height:100vh;font-family:'Noto Serif TC',serif;color:var(--ink);
  padding-top:max(28px,env(safe-area-inset-top));
  padding-bottom:max(80px,env(safe-area-inset-bottom));
  padding-left:max(16px,env(safe-area-inset-left));
  padding-right:max(16px,env(safe-area-inset-right));}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 10% 5%,rgba(210,170,50,.06),transparent 60%),radial-gradient(ellipse 50% 60% at 90% 90%,rgba(180,140,30,.05),transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto}

.header{text-align:center;margin-bottom:20px}
.eyebrow{font-size:11px;letter-spacing:7px;color:var(--gold);opacity:.7;margin-bottom:6px;text-transform:uppercase}
.header h1{font-family:'Playfair Display',serif;font-size:34px;color:var(--ink);letter-spacing:2px}
.rule{display:flex;align-items:center;gap:12px;margin:8px auto 0;width:140px}
.rule::before,.rule::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.rule span{color:var(--gold);font-size:12px}

.pbar{background:var(--cream2);border:1px solid var(--parchment);border-radius:14px;padding:14px 20px;margin-bottom:14px;position:relative;box-shadow:0 2px 12px rgba(139,100,30,.07)}
.pbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);border-radius:14px 14px 0 0}
.pbar-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.pbar-l{display:flex;align-items:center;gap:14px}
.price-three{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.price-col{display:flex;flex-direction:column;gap:3px}
.price-divider{font-size:16px;color:var(--dim);opacity:.6;margin-top:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(58,125,85,.5);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.plabel{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:3px}
.pmain{font-family:'Playfair Display',serif;font-size:24px;color:var(--ink)}
.pchange{font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;display:none}
.pchange.up{background:rgba(58,125,85,.12);color:var(--green)}
.pchange.down{background:rgba(160,57,43,.12);color:var(--red)}
.src-tag{font-size:10px;color:var(--dim);margin-top:2px}
.pright{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.fxbox{font-size:13px;color:var(--ink2)}
.updated{font-size:11px;color:var(--dim)}
.btn-ref{background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 12px;color:var(--gold);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Noto Serif TC',serif;white-space:nowrap}
.btn-ref:hover{border-color:var(--gold2);background:rgba(180,134,11,.06)}
.pload{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim)}
.spin{width:13px;height:13px;border:2px solid var(--parchment);border-top-color:var(--gold2);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:9px}
.card{background:var(--cream2);border:1px solid var(--parchment);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(139,100,30,.06)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.clabel{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:5px}
.cval{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink)}
.cval.pos{color:var(--green)}.cval.neg{color:var(--red)}
.cunit{font-size:11px;color:var(--dim);margin-left:2px}
.pnl-bar{background:var(--gold-pale);border:1px solid var(--parchment);border-radius:12px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 1px 6px rgba(139,100,30,.06)}

.urow{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.ulabel{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.utog{display:flex;background:var(--cream3);border:1px solid var(--parchment);border-radius:8px;overflow:hidden}
.ubtn{padding:6px 14px;font-family:'Noto Serif TC',serif;font-size:12px;color:var(--ink3);background:none;border:none;cursor:pointer;transition:all .2s;letter-spacing:1px}
.ubtn.active{background:var(--gold);color:#fff;font-weight:700}

.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.rtitle{font-size:11px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
.rcount{font-size:11px;color:var(--dim)}
.ritem{background:var(--cream2);border:1px solid var(--parchment);border-radius:13px;padding:13px 16px;margin-bottom:8px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(139,100,30,.05);transition:border-color .2s,box-shadow .15s}
.ritem:hover{border-color:var(--bdh);box-shadow:0 3px 14px rgba(139,100,30,.1)}
.ritem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--gold2),var(--gold));border-radius:3px 0 0 3px}
.ritem.profit::before{background:linear-gradient(to bottom,#4CAF7D,#2d7a54)}
.ritem.loss::before{background:linear-gradient(to bottom,#C0392B,#8B2318)}
.ritem.inactive::before{background:linear-gradient(to bottom,#aaa,#888)}
.rtop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.rname-wrap{flex:1;min-width:0}
.rname{font-size:15px;color:var(--ink);font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.tag{display:inline-block;background:var(--gold-pale);border:1px solid var(--parchment);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--gold);letter-spacing:1px}
.tag.status-held{background:rgba(58,125,85,.1);border-color:rgba(58,125,85,.25);color:var(--green)}
.tag.status-sold{background:rgba(139,100,30,.1);border-color:var(--parchment);color:var(--ink3)}
.tag.status-lost{background:rgba(160,57,43,.1);border-color:rgba(160,57,43,.2);color:var(--red)}
.tag.status-gifted{background:rgba(90,60,160,.08);border-color:rgba(90,60,160,.15);color:#5a3ca0}
.tag.status-received{background:rgba(58,125,85,.1);border-color:rgba(58,125,85,.25);color:var(--green)}
.rnote{font-size:12px;color:var(--dim);margin-top:2px;font-style:italic}
.rright{text-align:right;flex-shrink:0}
.rplabel{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.rpval{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink)}
.rmval{font-size:11px;color:var(--dim);margin-top:2px}
.rmeta{display:grid;grid-template-columns:repeat(4,1fr);gap:5px 12px}
.ml{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.mv{font-size:12px;color:var(--ink2);margin-top:1px}
.mv.pos{color:var(--green)}.mv.neg{color:var(--red)}
.rbot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid rgba(139,100,30,.1)}
.status-select{background:var(--cream);border:1px solid var(--parchment);border-radius:7px;padding:4px 10px;font-size:12px;color:var(--ink2);font-family:'Noto Serif TC',serif;cursor:pointer;outline:none}
.btndel{background:none;border:1px solid rgba(160,57,43,.2);color:rgba(160,57,43,.5);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .2s;font-family:'Noto Serif TC',serif}
.btndel:hover{background:rgba(160,57,43,.08);color:var(--red);border-color:var(--red)}
.empty{text-align:center;padding:44px 20px;color:var(--dim)}
.empty-icon{font-size:36px;margin-bottom:10px}

.add-wrap{margin-bottom:18px}
.add-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--cream2);border:1px solid var(--parchment);border-radius:12px;padding:12px 18px;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(139,100,30,.06);font-family:'Noto Serif TC',serif}
.add-toggle:hover{border-color:var(--gold2);background:var(--gold-pale)}
.add-toggle-left{display:flex;align-items:center;gap:10px}
.add-toggle-icon{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;line-height:1;flex-shrink:0;transition:transform .3s}
.add-toggle-label{font-size:13px;font-weight:600;color:var(--ink2);letter-spacing:1px}
.add-toggle-arrow{font-size:11px;color:var(--dim);transition:transform .3s}
.add-toggle.open .add-toggle-arrow{transform:rotate(180deg)}
.add-toggle.open .add-toggle-icon{transform:rotate(45deg)}
.add-body{background:var(--cream2);border:1px solid var(--parchment);border-top:none;border-radius:0 0 13px 13px;padding:0 18px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;box-shadow:0 3px 12px rgba(139,100,30,.07)}
.add-body.open{max-height:700px;padding:18px}
.add-toggle.open{border-radius:12px 12px 0 0;border-bottom-color:transparent}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.wrow{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.fg input,.fg select,.fg textarea{background:var(--cream);border:1px solid var(--parchment);border-radius:8px;padding:9px 12px;color:var(--ink);font-family:'Noto Serif TC',serif;font-size:14px;outline:none;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold2)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--dim);opacity:.5}
.fg select option{background:var(--cream);color:var(--ink)}
.fg textarea{resize:none;height:60px;font-size:13px}
.fhint{font-size:11px;color:var(--gold);margin-top:3px;min-height:15px}
.btnadd{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;letter-spacing:3px;border:none;border-radius:9px;cursor:pointer;transition:all .2s;margin-top:2px}
.btnadd:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(180,134,11,.25)}

.cpanel{background:var(--cream2);border:1px solid var(--parchment);border-radius:14px;padding:18px;margin-top:22px;position:relative;box-shadow:0 2px 12px rgba(139,100,30,.07)}
.cpanel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);border-radius:14px 14px 0 0}
.cheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.ctitle{font-size:11px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
.cmeta{font-size:11px;color:var(--dim)}
.cwrap{position:relative;height:160px}

@media(max-width:680px){
  .summary{grid-template-columns:repeat(2,1fr)}
  .fgrid{grid-template-columns:1fr 1fr}
  .wrow{grid-template-columns:1fr 1fr}
  .rmeta{grid-template-columns:repeat(2,1fr)}
  .header h1{font-size:28px}
  .pmain{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="eyebrow">✦ 珍藏記錄 ✦</div>
  <h1>金喝炭</h1>
  <div class="rule"><span>◆</span></div>
</div>

<div class="pbar">
  <div class="pbar-inner">
    <div class="pbar-l">
      <div class="dot" id="dot"></div>
      <div class="price-three">
        <div class="price-col">
          <div class="plabel">XAU / USD</div>
          <div id="xauusd" class="pload"><div class="spin"></div></div>
          <div class="pchange" id="pchange"></div>
        </div>
        <div class="price-divider">→</div>
        <div class="price-col">
          <div class="plabel">USD / TWD</div>
          <div class="fxbox" id="usdtwd">—</div>
        </div>
        <div class="price-divider">=</div>
        <div class="price-col">
          <div class="plabel">NT$ / 克</div>
          <div id="pdisplay">—</div>
        </div>
      </div>
    </div>
    <div class="pright">
      <div>
        <div class="updated" id="updated">—</div>
        <div class="updated" id="nextup" style="margin-top:2px"></div>
        <div class="src-tag" id="srctag"></div>
      </div>
      <span id="sync-status" style="font-size:11px;color:var(--dim)">☁ 連線中</span>
      <button class="btn-ref" onclick="fetchPrice(true)">↻ 更新</button>
    </div>
  </div>
</div>

<div class="summary">
  <div class="card"><div class="clabel">總筆數</div><div class="cval" id="s-n">—</div></div>
  <div class="card"><div class="clabel">持有重量（錢）</div><div class="cval" id="s-w">—</div></div>
  <div class="card"><div class="clabel">總成本</div><div class="cval" id="s-c">—</div></div>
  <div class="card"><div class="clabel">未實現損益</div><div class="cval" id="s-u">—</div></div>
</div>
<div class="pnl-bar">
  <div><div class="clabel" style="margin-bottom:3px">目前市值</div><div class="cval" id="s-m">—</div></div>
  <div><div class="clabel" style="margin-bottom:3px">已實現損益</div><div class="cval" id="s-r">—</div></div>
  <div><div class="clabel" style="margin-bottom:3px">總損益</div><div class="cval" id="s-t">—</div></div>
</div>

<div class="urow">
  <span class="ulabel">顯示單位</span>
  <div class="utog">
    <button class="ubtn active" onclick="setUnit('g')">公克</button>
    <button class="ubtn" onclick="setUnit('qian')">錢</button>
    <button class="ubtn" onclick="setUnit('liang')">兩</button>
    <button class="ubtn" onclick="setUnit('oz')">oz</button>
  </div>
</div>

<div class="rhead">
  <div class="rtitle">持倉 ＆ 歷史紀錄</div>
  <div class="rcount" id="rcount"></div>
</div>
<div id="rlist"></div>

<div class="add-wrap">
  <button class="add-toggle" id="addToggle" onclick="toggleForm()">
    <div class="add-toggle-left">
      <div class="add-toggle-icon">＋</div>
      <span class="add-toggle-label">新增紀錄</span>
    </div>
    <span class="add-toggle-arrow">▼</span>
  </button>
  <div class="add-body" id="addBody">
    <div class="fgrid">
      <div class="fg"><label>名稱</label><input id="fn" placeholder="例：黃金條塊、金幣"></div>
      <div class="fg"><label>購買通路</label><input id="fc" placeholder="例：台銀、銀樓"></div>
      <div class="fg"><label>購買日期</label><input type="date" id="fd"></div>
    </div>
    <div class="wrow">
      <div class="fg"><label>重量單位</label>
        <select id="fwu">
          <option value="g">公克 (g)</option>
          <option value="qian">錢</option>
          <option value="liang">兩</option>
          <option value="oz">盎司 (oz)</option>
        </select>
      </div>
      <div class="fg"><label>重量</label><input type="number" id="fw" placeholder="0.000" step="0.001" min="0"></div>
      <div class="fg"><label>數量</label><input type="number" id="fqty" placeholder="1" step="1" min="1" value="1"></div>
      <div class="fg"><label>購買價格（TWD）</label><input type="number" id="fp" placeholder="0" min="0"><div class="fhint" id="fhint"></div></div>
    </div>
    <div class="fg" style="margin-bottom:12px">
      <label>備註</label>
      <textarea id="fmemo" placeholder="選填，例：婚戒、紀念金幣…"></textarea>
    </div>
    <button class="btnadd" onclick="addRecord()">登　錄</button>
  </div>
</div>

<div class="cpanel">
  <div class="cheader">
    <div class="ctitle">持倉市值走勢</div>
    <div class="cmeta" id="cmeta">等待資料…</div>
  </div>
  <div class="cwrap"><canvas id="chart"></canvas></div>
</div>

</div>
<script>
// ── Firebase Realtime Database ──
firebase.initializeApp({
  apiKey:"AIzaSyC6-K_LYO8xq7U3R8F0MNdJn3y2OaqHYu8",
  authDomain:"gold2-7ceec.firebaseapp.com",
  databaseURL:"https://gold2-7ceec-default-rtdb.firebaseio.com",
  projectId:"gold2-7ceec",
  storageBucket:"gold2-7ceec.firebasestorage.app",
  messagingSenderId:"523603035790",
  appId:"1:523603035790:web:86fefc52aab5436b5d6bdf"
});
const db=firebase.database();
const recRef=db.ref('records');

const CK='gold_chart_v3';
const toG={g:1,qian:3.75,liang:37.5,oz:31.1035};
const UL={g:'g',qian:'錢',liang:'兩',oz:'oz'};
const STATUS={
  held:{label:'持有中',cls:'status-held'},
  sold:{label:'已出售',cls:'status-sold'},
  lost:{label:'遺失',cls:'status-lost'},
  gifted:{label:'已贈送',cls:'status-gifted'},
  received:{label:'獲得',cls:'status-received'},
};
const ACTIVE=new Set(['held','received']);
let unit='g',priceG=null,usdtwd=null,myChart=null,refreshTimer=null,countdown=30;
let records=[];

function setSyncStatus(s){
  const el=document.getElementById('sync-status');if(!el)return;
  const map={ok:['☁ 已同步','var(--green)'],ing:['☁ 同步中…','var(--gold)'],err:['☁ 同步失敗','var(--red)'],conn:['☁ 連線中','var(--dim)']};
  if(map[s]){el.textContent=map[s][0];el.style.color=map[s][1];}
}

// ── Real-time listener ──
recRef.on('value', snap=>{
  const data=snap.val();
  records=data?Object.values(data).sort((a,b)=>b.id-a.id):[];
  setSyncStatus('ok');
  render();
}, err=>{
  console.error('DB error:',err);
  setSyncStatus('err');
});

async function saveRecord(r){
  setSyncStatus('ing');
  try{
    await recRef.child(String(r.id)).set(r);
    setSyncStatus('ok');
  }catch(e){
    console.error(e);
    setSyncStatus('err');
    alert('儲存失敗，請確認網路連線');
  }
}
async function removeRecord(id){
  setSyncStatus('ing');
  try{
    await recRef.child(String(id)).remove();
    setSyncStatus('ok');
  }catch(e){
    console.error(e);
    setSyncStatus('err');
  }
}

const loadC=()=>{try{return JSON.parse(localStorage.getItem(CK))||{labels:[],values:[]};}catch{return{labels:[],values:[]};}}
const saveC=d=>localStorage.setItem(CK,JSON.stringify(d));

let formOpen=false;
function toggleForm(){
  formOpen=!formOpen;
  document.getElementById('addToggle').classList.toggle('open',formOpen);
  document.getElementById('addBody').classList.toggle('open',formOpen);
  if(formOpen){updateHint();setTimeout(()=>document.getElementById('fn').focus(),360);}
}

function setUnit(u){
  unit=u;
  document.querySelectorAll('.ubtn').forEach((b,i)=>b.classList.toggle('active',['g','qian','liang','oz'][i]===u));
  render();
}
function fw(g,u){const v=g/toG[u];return v%1===0?v.toFixed(0):parseFloat(v.toFixed(4)).toString();}
function fwQian(g){const v=g/3.75;return parseFloat(v.toFixed(3)).toString();}

async function tryGoldApiCom(){
  const r=await fetch('https://api.gold-api.com/price/XAU',{signal:AbortSignal.timeout(6000)});
  const d=await r.json();
  if(!d.price)throw new Error('no price');
  return{ozUSD:d.price,ch:d.ch??0,chp:d.chp??0,src:'gold-api.com'};
}
async function tryYahoo(){
  const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=1d&range=1d',{signal:AbortSignal.timeout(8000)});
  const d=await r.json();
  const price=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
  const prev=d?.chart?.result?.[0]?.meta?.chartPreviousClose;
  if(!price)throw new Error('no price');
  const ch=price-(prev||price),chp=prev?(ch/prev*100):0;
  return{ozUSD:price,ch,chp,src:'Yahoo Finance'};
}
async function fetchUSDTWD(){
  const r=await fetch('https://open.er-api.com/v6/latest/USD',{signal:AbortSignal.timeout(6000)});
  const d=await r.json();return d.rates.TWD;
}

async function fetchPrice(manual=false){
  const dot=document.getElementById('dot');
  dot.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--gold2);flex-shrink:0';
  if(manual)document.getElementById('xauusd').innerHTML='<div class="pload"><div class="spin"></div> 更新中...</div>';
  let goldData=null,twd=null;
  try{goldData=await tryGoldApiCom();}catch{try{goldData=await tryYahoo();}catch{}}
  try{twd=await fetchUSDTWD();}catch{twd=32.5;}
  if(goldData&&twd){
    usdtwd=twd;
    const gUSD=goldData.ozUSD/31.1035;
    priceG=gUSD*usdtwd;
    document.getElementById('xauusd').innerHTML=`<span class="pmain">$${Math.round(goldData.ozUSD).toLocaleString()}</span>`;
    document.getElementById('usdtwd').innerHTML=`<span class="pmain" style="font-size:20px">${usdtwd.toFixed(2)}</span>`;
    document.getElementById('pdisplay').innerHTML=`<span class="pmain" style="font-size:20px">${priceG.toFixed(1)}</span>`;
    document.getElementById('srctag').textContent=`來源：${goldData.src}`;
    const pel=document.getElementById('pchange');
    pel.style.display='block';
    pel.className='pchange '+(goldData.ch>=0?'up':'down');
    pel.textContent=`${goldData.ch>=0?'▲':'▼'} ${Math.abs(goldData.ch).toFixed(2)} (${Math.abs(goldData.chp).toFixed(2)}%)`;
    const now=new Date();
    document.getElementById('updated').textContent=`更新：${now.toLocaleTimeString('zh-TW')}`;
    dot.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(58,125,85,.5);animation:pulse 2s infinite;flex-shrink:0';
    const mv=calcMV();
    if(mv>0){
      const h=loadC();
      h.labels.push(now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
      h.values.push(Math.round(mv));
      if(h.labels.length>200){h.labels.shift();h.values.shift();}
      saveC(h);updateChart(h);
    }
    render();
  }else{
    document.getElementById('xauusd').innerHTML=`<span style="color:var(--red);font-size:12px">⚠ 無法取得金價</span>`;
    dot.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0';
  }
  updateHint();resetCountdown();
}

function calcMV(){
  if(!priceG)return 0;
  return records.filter(r=>ACTIVE.has(r.status||'held')).reduce((s,r)=>s+r.weightG*priceG,0);
}
function resetCountdown(){
  countdown=30;clearInterval(refreshTimer);
  refreshTimer=setInterval(()=>{
    countdown--;
    document.getElementById('nextup').textContent=countdown>0?`${countdown}s 後更新`:'更新中…';
    if(countdown<=0)fetchPrice(false);
  },1000);
}
function updateHint(){
  if(!priceG)return;
  const w=parseFloat(document.getElementById('fw').value)||0;
  const wu=document.getElementById('fwu').value;
  const qty=parseFloat(document.getElementById('fqty').value)||1;
  const wg=w*toG[wu]*qty;
  document.getElementById('fhint').textContent=wg>0?`市值參考：NT$ ${Math.round(wg*priceG).toLocaleString()}`:`金價：NT$ ${priceG.toFixed(1)} / 克`;
}

function initChart(){
  const ctx=document.getElementById('chart').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,160);
  g.addColorStop(0,'rgba(180,134,11,.16)');g.addColorStop(1,'rgba(180,134,11,0)');
  myChart=new Chart(ctx,{
    type:'line',
    data:{labels:[],datasets:[{label:'市值',data:[],borderColor:'#B8860B',backgroundColor:g,borderWidth:2,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:'#D4A017',fill:true,tension:0.4}]},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:400},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#FAF5EC',borderColor:'rgba(139,100,30,.25)',borderWidth:1,titleColor:'#3C2E1A',bodyColor:'#5C4A30',callbacks:{label:c=>`NT$ ${Math.round(c.parsed.y).toLocaleString()}`}}},
      scales:{
        x:{grid:{color:'rgba(139,100,30,.06)'},ticks:{color:'#9A8060',font:{size:10},maxTicksLimit:8}},
        y:{grid:{color:'rgba(139,100,30,.06)'},ticks:{color:'#9A8060',font:{size:10},callback:v=>'NT$'+Math.round(v/1000)+'K'}}
      }
    }
  });
}
function updateChart(h){
  if(!myChart)return;
  myChart.data.labels=h.labels;
  myChart.data.datasets[0].data=h.values;
  myChart.update('none');
  document.getElementById('cmeta').textContent=`${h.labels.length} 筆 · 每 30 秒更新`;
}

async function addRecord(){
  const name=document.getElementById('fn').value.trim();
  const ch=document.getElementById('fc').value.trim();
  const date=document.getElementById('fd').value;
  const wu=document.getElementById('fwu').value;
  const wi=parseFloat(document.getElementById('fw').value);
  const qty=parseFloat(document.getElementById('fqty').value)||1;
  const price=parseFloat(document.getElementById('fp').value);
  const memo=document.getElementById('fmemo').value.trim();
  if(!name||!date||isNaN(wi)||wi<=0||isNaN(price)||price<0){
    alert('請填寫完整資訊（名稱、日期、重量、購買價格為必填）');return;
  }
  const weightG=wi*toG[wu]*qty;
  const r={id:Date.now(),name,ch,date,weightG,qty,price,memo,status:'held',realized:0};
  await saveRecord(r);
  ['fn','fc','fw','fp','fmemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fqty').value='1';
  document.getElementById('fd').value=new Date().toISOString().split('T')[0];
  formOpen=true;toggleForm();
}

async function updateStatus(id,newStatus){
  const r=records.find(r=>r.id===id);
  if(!r)return;
  if(newStatus==='sold'){
    const mgv=priceG?r.weightG*priceG:null;
    const hint=mgv?`（當前市值約 NT$${Math.round(mgv).toLocaleString()}）`:'';
    const input=prompt(`出售金額${hint}\n請輸入實際售出金額（TWD）：`);
    if(input===null)return;
    const sellPrice=parseFloat(input);
    if(!isNaN(sellPrice))r.realized=sellPrice-r.price;
  }
  r.status=newStatus;
  await saveRecord(r);
}

async function delRecord(id){
  if(!confirm('確定刪除這筆紀錄？'))return;
  await removeRecord(id);
}

function setPC(id,v){
  const el=document.getElementById(id);
  if(v===null){el.className='cval';el.textContent='—';return;}
  el.className='cval '+(v>=0?'pos':'neg');
  el.textContent=(v>=0?'+':'-')+'NT$'+Math.round(Math.abs(v)).toLocaleString();
}

function render(){
  const recs=records;
  const active=recs.filter(r=>ACTIVE.has(r.status||'held'));
  const twG=active.reduce((s,r)=>s+r.weightG,0);
  const tc=recs.reduce((s,r)=>s+r.price,0);
  const tReal=recs.reduce((s,r)=>s+(r.realized||0),0);
  const mv=priceG?active.reduce((s,r)=>s+r.weightG*priceG,0):null;
  const activeCost=active.reduce((s,r)=>s+r.price,0);
  const unreal=mv!==null?mv-activeCost:null;

  document.getElementById('s-n').innerHTML=`${recs.length}<span class="cunit">筆</span>`;
  document.getElementById('s-w').innerHTML=`${fwQian(twG)}<span class="cunit">錢</span>`;
  document.getElementById('s-c').textContent=`NT$${Math.round(tc).toLocaleString()}`;
  setPC('s-u',unreal);
  document.getElementById('s-m').textContent=mv!==null?`NT$${Math.round(mv).toLocaleString()}`:'—';
  setPC('s-r',tReal===0?null:tReal);
  setPC('s-t',(unreal!==null||(tReal!==0))?((unreal??0)+tReal):null);
  document.getElementById('rcount').textContent=`共 ${recs.length} 筆`;

  const list=document.getElementById('rlist');
  if(!recs.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">⚜</div><div>尚無紀錄，點下方「新增紀錄」開始</div></div>';
    return;
  }
  list.innerHTML=recs.map(r=>{
    const status=r.status||'held';
    const isActive=ACTIVE.has(status);
    const wDisp=fw(r.weightG,unit);
    const wQian=fwQian(r.weightG);
    const wLabel=unit==='qian'?`${wDisp} 錢`:`${wDisp} ${UL[unit]}（${wQian} 錢）`;
    const mgv=priceG&&isActive?r.weightG*priceG:null;
    const unr=mgv!==null?mgv-r.price:null;
    const cpg=r.weightG>0?r.price/r.weightG:0;
    const cls=isActive?(unr!==null?(unr>=0?' profit':' loss'):''):'inactive';
    const unrealRow=unr!==null?`<div><div class="ml">未實現損益</div><div class="mv ${unr>=0?'pos':'neg'}">${unr>=0?'+':'-'}NT$${Math.round(Math.abs(unr)).toLocaleString()}</div></div>`:'';
    const realRow=(r.realized&&r.realized!==0)?`<div><div class="ml">已實現損益</div><div class="mv ${r.realized>=0?'pos':'neg'}">${r.realized>=0?'+':'-'}NT$${Math.abs(Math.round(r.realized)).toLocaleString()}</div></div>`:'';
    const statusSt=STATUS[status]||STATUS.held;
    const statusOptions=Object.entries(STATUS).map(([k,v])=>`<option value="${k}"${k===status?' selected':''}>${v.label}</option>`).join('');
    return `<div class="ritem${cls}">
      <div class="rtop">
        <div class="rname-wrap">
          <div class="rname">
            ${r.name}
            ${r.ch?`<span class="tag">${r.ch}</span>`:''}
            <span class="tag ${statusSt.cls}">${statusSt.label}</span>
            ${r.qty&&r.qty>1?`<span class="tag">x${r.qty}</span>`:''}
          </div>
          ${r.memo?`<div class="rnote">📝 ${r.memo}</div>`:''}
        </div>
        <div class="rright">
          <div class="rplabel">購買金額</div>
          <div class="rpval">NT$${r.price.toLocaleString()}</div>
          ${mgv!==null?`<div class="rmval">市值 NT$${Math.round(mgv).toLocaleString()}</div>`:''}
        </div>
      </div>
      <div class="rmeta">
        <div><div class="ml">重量</div><div class="mv">${wLabel}</div></div>
        <div><div class="ml">日期</div><div class="mv">${r.date.replace(/-/g,'/')}</div></div>
        <div><div class="ml">成本/克</div><div class="mv">NT$${Math.round(cpg).toLocaleString()}</div></div>
        ${unrealRow}${realRow}
      </div>
      <div class="rbot">
        <select class="status-select" onchange="updateStatus(${r.id},this.value)">${statusOptions}</select>
        <button class="btndel" onclick="delRecord(${r.id})">刪除</button>
      </div>
    </div>`;
  }).join('');
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

document.getElementById('fd').value=new Date().toISOString().split('T')[0];
document.getElementById('fw').addEventListener('input',updateHint);
document.getElementById('fwu').addEventListener('change',updateHint);
document.getElementById('fqty').addEventListener('input',updateHint);
initChart();
const saved=loadC();
if(saved.labels.length)updateChart(saved);
fetchPrice(true);
</script>
</body>
</html>
